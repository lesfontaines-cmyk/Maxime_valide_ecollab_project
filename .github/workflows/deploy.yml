name: Deploy to server

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: self-hosted
    steps:
      - name: Deploy via SSH
        run: |
          ssh ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }} 'set -e
            cd ${{ secrets.PROJECT_PATH }}
            git fetch origin main
            git reset --hard origin/main
            cd Maxime_valide_ecollab_serveur
            OLD=$(docker ps -aq --filter ancestor=valide)
            docker build -t valide .
            docker rm -f $OLD valide-serveur 2>/dev/null || true
            docker run -d --name valide-serveur --restart unless-stopped -e PORT=6541 -p 6541:6541 valide
            docker image prune -f || true
            echo "=== deployed ==="
            docker ps --filter name=valide-serveur --format "{{.Names}} {{.Status}} {{.Ports}}"
          '
