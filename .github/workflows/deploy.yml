name: Deploy to server

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: self-hosted
    steps:
      - name: Diagnostics serveur
        run: |
          ssh ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }} 'set +e
            C=$(docker ps --filter ancestor=valide --format "{{.Names}}" | head -1)
            echo "=== container valide ==="; echo "$C"
            echo "=== image ==="; docker inspect -f "{{.Config.Image}}" "$C" 2>&1
            echo "=== port bindings ==="; docker inspect -f "{{json .HostConfig.PortBindings}}" "$C" 2>&1
            echo "=== restart policy ==="; docker inspect -f "{{json .HostConfig.RestartPolicy}}" "$C" 2>&1
            echo "=== env ==="; docker inspect -f "{{json .Config.Env}}" "$C" 2>&1
            echo "=== mounts ==="; docker inspect -f "{{json .Mounts}}" "$C" 2>&1
            echo "=== cmd/entrypoint ==="; docker inspect -f "Entrypoint={{json .Config.Entrypoint}} Cmd={{json .Config.Cmd}}" "$C" 2>&1
            echo "=== how images are built (image labels) ==="; docker image inspect valide -f "{{json .Config.Labels}}" 2>&1
          '

      - name: Deploy via SSH
        run: |
          ssh ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }} "cd ${{ secrets.PROJECT_PATH }} && git fetch origin main && git reset --hard origin/main && sudo systemctl restart valide-serveur || true"
